name: CI/CD - React App + NPM Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ===============================
  #  JOB 1 BUILD & TEST
  # ===============================
  build_test:
    name: Build, Test & Docs
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node_version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - run: pnpm install

      - name: Run tests
        run: pnpm test
        working-directory: my-app

      - name: Build React app
        run: pnpm build
        working-directory: my-app


  # ===============================
  #  JOB 2 -  PUBLISH NPM
  # ===============================
  publish-npm:
    name: Publish to NPM
    needs: build_test
    runs-on: ubuntu-latest

    outputs:
      published: ${{ steps.version_check.outputs.published }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install

      # 🔎 Compare versions
      - name: Check version difference
        id: version_check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view $(node -p "require('./package.json').name") version || echo "0.0.0")

          echo "Local: $LOCAL_VERSION"
          echo "Remote: $REMOTE_VERSION"

          if [ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]; then
            echo "New version detected"
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "No new version"
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      #  Build NPM package
      - name: Build library
        if: steps.version_check.outputs.published == 'true'
        run: pnpm run build-npm-ci

      #  Publish
      - name: Publish to NPM
        if: steps.version_check.outputs.published == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Skip message
      - name: Skip publish
        if: steps.version_check.outputs.published == 'false'
        run: echo "Version unchanged — skipping publish."


  # ===============================
  # JOB 3 - DEPLOY
  # ===============================
  deploy:
    name: Deploy to GitHub Pages
    needs: publish-npm
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4