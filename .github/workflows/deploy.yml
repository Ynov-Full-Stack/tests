name: Deploy App Stack

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-3
      TF_IN_AUTOMATION: "true"
      TERRAFORM_DIRECTORY: infra
      TERRAFORM_OUTPUT_IP: instance_ip
      TERRAFORM_OUTPUT_PRIVATE_KEY: private_key
      ANSIBLE_PLAYBOOK_PATH: infra/playbook.yaml
      ANSIBLE_SSH_USER: ubuntu
      BACKEND_HEALTH_PATH: /health

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || { echo "Missing required secret: AWS_ACCESS_KEY_ID"; exit 1; }
          [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] || { echo "Missing required secret: AWS_SECRET_ACCESS_KEY"; exit 1; }
          [ -n "${{ secrets.REGISTRY_ENDPOINT }}" ] || { echo "Missing required secret: REGISTRY_ENDPOINT"; exit 1; }
          [ -n "${{ secrets.REGISTRY_USERNAME }}" ] || { echo "Missing required secret: REGISTRY_USERNAME"; exit 1; }
          [ -n "${{ secrets.REGISTRY_PASSWORD }}" ] || { echo "Missing required secret: REGISTRY_PASSWORD"; exit 1; }
          [ -n "${{ secrets.MYSQL_ROOT_PASSWORD }}" ] || { echo "Missing required secret: MYSQL_ROOT_PASSWORD"; exit 1; }
          [ -n "${{ secrets.MYSQL_DB }}" ] || { echo "Missing required secret: MYSQL_DB"; exit 1; }

      - name: Validate paths
        shell: bash
        run: |
          set -euo pipefail
          test -d "${{ env.TERRAFORM_DIRECTORY }}"
          test -f "${{ env.ANSIBLE_PLAYBOOK_PATH }}"

      - name: Resolve registry endpoint
        shell: bash
        run: |
          set -euo pipefail

          REGISTRY_ENDPOINT_RAW="${{ secrets.REGISTRY_ENDPOINT }}"
          [ -n "$REGISTRY_ENDPOINT_RAW" ] || { echo "REGISTRY_ENDPOINT secret is empty"; exit 1; }

          REGISTRY_HOST="${REGISTRY_ENDPOINT_RAW#https://}"
          REGISTRY_HOST="${REGISTRY_HOST#http://}"
          REGISTRY_HOST="${REGISTRY_HOST%/}"
          if [[ "$REGISTRY_HOST" != *:* ]]; then
            REGISTRY_HOST="$REGISTRY_HOST:443"
          fi

          REGISTRY_URL="https://$REGISTRY_HOST"

          echo "REGISTRY_HOST=$REGISTRY_HOST" >> "$GITHUB_ENV"
          echo "REGISTRY_URL=$REGISTRY_URL" >> "$GITHUB_ENV"

      - name: Set image names
        shell: bash
        run: |
          set -euo pipefail

          REPOSITORY="${{ github.repository }}"
          REPOSITORY="$(echo "$REPOSITORY" | tr '[:upper:]' '[:lower:]')"

          FRONTEND_IMAGE="$REGISTRY_HOST/$REPOSITORY/frontend:${{ github.sha }}"
          BACKEND_IMAGE="$REGISTRY_HOST/$REPOSITORY/backend:${{ github.sha }}"

          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> "$GITHUB_ENV"

      - name: Configure Docker insecure registry
        shell: bash
        run: |
          set -euo pipefail

          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json > /dev/null <<EOF
          {
            "insecure-registries": ["$REGISTRY_HOST"]
          }
          EOF

      - name: Restart Docker
        shell: bash
        run: |
          set -euo pipefail
          sudo systemctl restart docker
          sudo systemctl is-active docker

      - name: Login to private registry
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "$REGISTRY_HOST" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build and push backend image
        shell: bash
        run: |
          set -euo pipefail
          docker build -f server/fastapi.Dockerfile -t "$BACKEND_IMAGE" server
          docker push "$BACKEND_IMAGE"

      - name: Build and push frontend image
        shell: bash
        run: |
          set -euo pipefail
          docker build -f my-app/react.Dockerfile -t "$FRONTEND_IMAGE" my-app
          docker push "$FRONTEND_IMAGE"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}
        shell: bash
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}
        shell: bash
        run: terraform apply -auto-approve -input=false

      - name: Bridge Terraform outputs to Ansible
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}
        shell: bash
        run: |
          set -euo pipefail

          SERVER_IP="$(terraform output -raw "${{ env.TERRAFORM_OUTPUT_IP }}")"
          SSH_KEY_FILE="$RUNNER_TEMP/deploy-key.pem"
          INVENTORY_FILE="$RUNNER_TEMP/inventory.ini"
          HOST_LINE="$SERVER_IP ansible_user=${{ env.ANSIBLE_SSH_USER }} ansible_ssh_private_key_file=$SSH_KEY_FILE ansible_ssh_common_args='-o StrictHostKeyChecking=no'"

          terraform output -raw "${{ env.TERRAFORM_OUTPUT_PRIVATE_KEY }}" > "$SSH_KEY_FILE"
          chmod 600 "$SSH_KEY_FILE"

          {
            echo "[app_hosts]"
            echo "$HOST_LINE"
          } > "$INVENTORY_FILE"

          echo "SERVER_IP=$SERVER_IP" >> "$GITHUB_ENV"
          echo "SSH_KEY_FILE=$SSH_KEY_FILE" >> "$GITHUB_ENV"
          echo "ANSIBLE_INVENTORY=$INVENTORY_FILE" >> "$GITHUB_ENV"

      - name: Wait for SSH availability
        shell: bash
        run: |
          set -euo pipefail

          for _ in {1..30}; do
            if ssh -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=no -o ConnectTimeout=5 "${{ env.ANSIBLE_SSH_USER }}@$SERVER_IP" "echo ready" >/dev/null 2>&1; then
              echo "SSH is reachable"
              exit 0
            fi
            sleep 10
          done

          echo "SSH is not reachable after timeout"
          exit 1

      - name: Install Ansible
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      - name: Create Ansible vars file
        shell: bash
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/ansible-vars.json" <<EOF
          {
            "registry_url": "${REGISTRY_URL}",
            "registry_username": "${{ secrets.REGISTRY_USERNAME }}",
            "registry_password": "${{ secrets.REGISTRY_PASSWORD }}",
            "frontend_image": "${FRONTEND_IMAGE}",
            "backend_image": "${BACKEND_IMAGE}",
            "mysql_root_password": "${{ secrets.MYSQL_ROOT_PASSWORD }}",
            "mysql_db": "${{ secrets.MYSQL_DB }}",
            "mysql_db_password": "${{ secrets.MYSQL_ROOT_PASSWORD }}",
            "mysql_host": "db",
            "app_public_ip": "${SERVER_IP}"
          }
          EOF

      - name: Run Ansible playbook
        shell: bash
        run: |
          set -euo pipefail
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i "$ANSIBLE_INVENTORY" "${{ env.ANSIBLE_PLAYBOOK_PATH }}" --extra-vars "@$RUNNER_TEMP/ansible-vars.json"

      - name: Validate deployment
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 60 --retry-delay 5 --retry-connrefused "http://$SERVER_IP:3000/" >/dev/null
          curl --fail --silent --show-error --retry 60 --retry-delay 5 --retry-connrefused "http://$SERVER_IP:8000${{ env.BACKEND_HEALTH_PATH }}" >/dev/null

      - name: Debug remote services on failure
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=no "${{ env.ANSIBLE_SSH_USER }}@$SERVER_IP" '
            set -e
            echo "===== docker ps -a ====="
            docker ps -a
            echo ""
            echo "===== docker compose logs (last 200 lines) ====="
            cd /home/ubuntu/app-stack && docker compose logs --tail 200 || true
            echo ""
            echo "===== listening ports ====="
            ss -tulpen
          '

      - name: Print deployment URLs
        shell: bash
        run: |
          echo "Frontend URL: http://$SERVER_IP:3000"
          echo "Backend URL: http://$SERVER_IP:8000${{ env.BACKEND_HEALTH_PATH }}"

      - name: Terraform destroy (cleanup)
        if: ${{ failure() }}
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}
        shell: bash
        run: terraform destroy -auto-approve -input=false
