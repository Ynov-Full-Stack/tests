services:
  db:
    image: mysql:9.6
    environment:
      - MYSQL_ROOT_PASSWORD

    ports:
      - "3306:3306"
    volumes:
      - ./sqlfiles/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  server:
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MYSQL_HOST=db
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
      - MYSQL_USER
    ports:
      - "8000:8000"
    build:
      context: ./server
      dockerfile: "fastapi.Dockerfile"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 5s
      timeout: 3s
      retries: 20

  react:
    image: react
    build:
      context: ./my-app
      dockerfile: react.Dockerfile
    ports:
      - 3000:3000
    environment:
      - REACT_APP_SERVER_PORT=8000
    volumes:
      - ./my-app:/app
      - /app/node_modules
    depends_on:
      - server
    command: npm start

  cypress:
    image: cypress/included:13.6.0
    entrypoint: ["npx"]
    working_dir: /e2e
    volumes:
      - ./my-app:/e2e
    environment:
      CYPRESS_baseUrl: http://server:8000
      CYPRESS_defaultCommandTimeout: 40000
      CYPRESS_grep: 500
    command: ["cypress", "run"]
    depends_on:
      - react

  adminer:
    depends_on:
      db:
        condition: service_healthy
    image: adminer
    ports:
      - '39080:8080'
