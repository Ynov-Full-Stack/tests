---
- name: Déploiement d'un Registry Docker Sécurisé
  hosts: registry_hosts
  become: true
  vars:
    project_dir: "/home/ubuntu/registry-stack"
    public_ip: "{{ ansible_host }}"
    registry_username: "admin"
    registry_password: "admin123"

  tasks:
    - name: Mise à jour du cache APT
      apt:
        update_cache: yes

    - name: Installation de docker et outils
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - apache2-utils
          - openssl
          - python3-passlib
        state: present

    - name: Ajout user ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Configurer Docker pour accepter le registry insecure
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "insecure-registries": ["{{ public_ip }}:5000", "{{ public_ip }}:443"]
          }
        mode: '0644'

    - name: Redémarrer Docker
      service:
        name: docker
        state: restarted

    - name: Création des dossiers
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/auth"
        - "{{ project_dir }}/data"
        - "{{ project_dir }}/ssl"
        - "{{ project_dir }}/nginx"

    - name: Génération certificat SSL auto-signé
      command: >
        openssl req -x509 -nodes -days 365
        -newkey rsa:2048
        -keyout {{ project_dir }}/ssl/registry.key
        -out {{ project_dir }}/ssl/registry.crt
        -subj "/CN={{ public_ip }}"
        -addext "subjectAltName=IP:{{ public_ip }}"
      args:
        creates: "{{ project_dir }}/ssl/registry.crt"

    - name: Génération mot de passe
      htpasswd:
        path: "{{ project_dir }}/auth/registry.password"
        name: "{{ registry_username }}"
        password: "{{ registry_password }}"

    - name: Copie du docker-compose.yaml
      template:
        src: templates/compose.yaml.j2
        dest: "{{ project_dir }}/compose.yaml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Copier config nginx
      template:
        src: templates/nginx.conf.j2
        dest: "{{ project_dir }}/nginx/nginx.conf"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Stop anciens containers
      command: docker compose down
      args:
        chdir: "{{ project_dir }}"

    - name: Démarrage de la stack
      command: docker compose up -d 
      args:
        chdir: "{{ project_dir }}"

    - name: Login au registry Docker privé
      community.docker.docker_login:
        registry_url: "https://{{ public_ip }}:443"
        username: "{{ registry_username }}"
        password: "{{ registry_password }}"

