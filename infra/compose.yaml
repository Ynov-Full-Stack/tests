version: "3.8"
services:
  db:
    image: mysql:9.6
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DB}
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=${MYSQL_DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./sqlfiles/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  server:
    image: ${BACKEND_IMAGE}
    environment:
      - MYSQL_HOST=db
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DB}
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=${MYSQL_DB_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  react:
    image: ${FRONTEND_IMAGE}
    environment:
      - REACT_APP_SERVER_PORT=8000
    ports:
      - "3000:3000"
    depends_on:
      - server
    command: npm start

  adminer:
    image: adminer
    ports:
      - "39080:8080"
    depends_on:
      db:
        condition: service_healthy
