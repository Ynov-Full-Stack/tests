---
- name: Deploy application stack
  hosts: app_hosts
  become: true
  vars:
    project_dir: "/home/ubuntu/app-stack"

  tasks:
    - name: Validate required deployment variables
      assert:
        that:
          - registry_url is defined
          - registry_url | length > 0
          - registry_username is defined
          - registry_username | length > 0
          - registry_password is defined
          - registry_password | length > 0
          - frontend_image is defined
          - frontend_image | length > 0
          - backend_image is defined
          - backend_image | length > 0
          - mysql_root_password is defined
          - mysql_root_password | length > 0
          - mysql_db is defined
          - mysql_db | length > 0
        quiet: true

    - name: Compute registry host from endpoint
      set_fact:
        registry_host: "{{ registry_url | regex_replace('^https?://', '') | regex_replace('/$', '') }}"

    - name: Update APT cache
      apt:
        update_cache: true

    - name: Install Docker runtime
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Check active swap devices
      command: swapon --show=NAME --noheadings
      register: swap_devices
      changed_when: false
      failed_when: false

    - name: Ensure 2G swap file exists and is enabled
      shell: |
        set -euo pipefail
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048
          chmod 600 /swapfile
          mkswap /swapfile
        fi
        swapon /swapfile || true
        grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
      args:
        executable: /bin/bash
      when: swap_devices.stdout | trim == ""

    - name: Ensure project folders exist
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/sqlfiles"

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Copy compose file to server
      copy:
        src: "{{ playbook_dir }}/compose.yaml"
        dest: "{{ project_dir }}/compose.yaml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Copy SQL migrations to server
      copy:
        src: "{{ playbook_dir }}/../sqlfiles/"
        dest: "{{ project_dir }}/sqlfiles/"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Configure Docker insecure registry for private endpoint
      copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        content: |
          {
            "insecure-registries": ["{{ registry_host }}"]
          }

    - name: Restart Docker service
      service:
        name: docker
        state: restarted
        enabled: true

    - name: Create runtime environment file
      copy:
        dest: "{{ project_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
        content: |
          FRONTEND_IMAGE={{ frontend_image }}
          BACKEND_IMAGE={{ backend_image }}
          MYSQL_ROOT_PASSWORD={{ mysql_root_password }}
          MYSQL_DB={{ mysql_db }}
          MYSQL_DB_PASSWORD={{ mysql_db_password | default(mysql_root_password) }}

    - name: Login to private registry
      shell: |
        echo "{{ registry_password }}" | docker login "{{ registry_host }}" -u "{{ registry_username }}" --password-stdin
      args:
        executable: /bin/bash
      no_log: true

    - name: Pull application images
      shell: |
        set -euo pipefail
        timeout 900 docker compose --env-file .env pull
      args:
        chdir: "{{ project_dir }}"
        executable: /bin/bash

    - name: Start application stack
      shell: |
        set -euo pipefail
        timeout 900 docker compose --env-file .env up -d --remove-orphans
      args:
        chdir: "{{ project_dir }}"
        executable: /bin/bash
      async: 1200
      poll: 5

    - name: Wait for backend port to listen
      wait_for:
        host: "127.0.0.1"
        port: 8000
        delay: 2
        timeout: 300

    - name: Wait for frontend port to listen
      wait_for:
        host: "127.0.0.1"
        port: 3000
        delay: 2
        timeout: 300
